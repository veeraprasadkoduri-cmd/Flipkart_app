<section class="deals-section" aria-label="Deal of the day">
  <div class="deals-inner">
    <div class="deals-shelf">
      <div class="deals-header">
        <h2 class="section-title">⚡ Deal of the <span>Day</span></h2>
        <div class="deal-timer" aria-label="Time remaining for deals">
          <span class="timer-label">Ends in</span>
          <div class="timer-display">
            <span class="timer-block" id="timer-hours">08</span>
            <span class="timer-sep">:</span>
            <span class="timer-block" id="timer-mins">24</span>
            <span class="timer-sep">:</span>
            <span class="timer-block" id="timer-secs">00</span>
          </div>
        </div>
        <button class="view-all-btn" onclick="showToast('Opening all deals!')">View All Deals</button>
      </div>
      <div class="deals-scroll" id="deals-scroll">
        <!-- Injected by JS -->
      </div>
    </div>
  </div>
</section>
