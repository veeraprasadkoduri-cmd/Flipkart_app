<section class="newsletter-section" aria-label="Newsletter subscription">
  <div class="newsletter-inner">
    <div class="newsletter-text">
      <h3>📬 Stay in the Loop!</h3>
      <p>Get exclusive deals, new arrivals &amp; special offers right in your inbox.</p>
    </div>
    <div class="newsletter-form" role="form" aria-label="Newsletter signup">
      <input
        type="email"
        id="newsletter-email"
        placeholder="Enter your email address"
        aria-label="Email address"
      />
      <button onclick="subscribeNewsletter()">Subscribe</button>
    </div>
  </div>
</section>
