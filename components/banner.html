<section class="banner-section" aria-label="Promotional banners">
  <div class="banner-inner">
    <div class="banner-slider" id="banner-slider">

      <!-- Slides injected by JS -->

      <button class="slider-btn prev" onclick="changeSlide(-1)" aria-label="Previous slide">&#8249;</button>
      <button class="slider-btn next" onclick="changeSlide(1)" aria-label="Next slide">&#8250;</button>
      <div class="slider-dots" id="slider-dots" role="tablist"></div>
    </div>
  </div>
</section>
